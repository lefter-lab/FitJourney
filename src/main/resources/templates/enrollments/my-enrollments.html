<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Enrollments - FitJourney</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold" href="/">🏋️ FitJourney</a>
    <div class="d-flex gap-2">
        <a href="/programs/all" class="btn btn-outline-light btn-sm">Browse Programs</a>
        <a href="/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
        <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-danger btn-sm">Logout</button>
        </form>
    </div>
</nav>
<div class="container mt-4">
    <h2 class="mb-4">My Enrollments</h2>
    <div th:if="${#lists.isEmpty(enrollments)}" class="alert alert-info">
        You have no enrollments yet.
        <a href="/programs/all" class="alert-link">Browse programs</a>
    </div>
    <div class="row g-3" th:unless="${#lists.isEmpty(enrollments)}">
        <div class="col-md-6" th:each="enrollment : ${enrollments}">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${enrollment.workoutProgram.title}"></h5>
                    <span class="badge bg-secondary mb-2"
                          th:text="${enrollment.workoutProgram.difficulty}"></span>
                    <div class="mb-2">
                        <label class="form-label small">
                            Progress: <strong th:text="${enrollment.progressPercentage} + '%'"></strong>
                        </label>
                        <div class="progress">
                            <div class="progress-bar bg-success"
                                 th:style="'width:' + ${enrollment.progressPercentage} + '%'">
                            </div>
                        </div>
                    </div>
                    <form th:action="@{/enrollments/{id}/progress(id=${enrollment.id})}"
                          method="post" class="d-flex gap-2 mt-3">
                        <input type="number" name="percentage" class="form-control form-control-sm"
                               min="0" max="100"
                               th:value="${enrollment.progressPercentage}">
                        <button type="submit" class="btn btn-primary btn-sm">Update</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
