<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Enrollments - FitJourney</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fj-page">
<nav class="navbar navbar-dark fj-navbar px-4">
    <a class="navbar-brand fw-bold" href="/">🏋️ FitJourney</a>
    <div class="d-flex gap-2">
        <a href="/programs/all" class="btn btn-outline-light btn-sm">Browse Programs</a>
        <a href="/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
        <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-danger btn-sm">Logout</button>
        </form>
    </div>
</nav>

<main class="container fj-main">
    <div class="fj-page-header">
        <h2>My Enrollments</h2>
        <p>Track your progress and update completion for each program.</p>
    </div>

    <div th:if="${#lists.isEmpty(enrollments)}" class="alert alert-info fj-empty-state">
        You have no enrollments yet.
        <a href="/programs/all" class="alert-link">Browse programs</a>
    </div>

    <div class="row g-4" th:unless="${#lists.isEmpty(enrollments)}">
        <div class="col-md-6" th:each="enrollment : ${enrollments}">
            <div class="card h-100 fj-card fj-enrollment-card">
                <div class="card-body">
                    <h5 class="card-title" th:text="${enrollment.workoutProgram.title}"></h5>
                    <span class="badge bg-secondary mb-3"
                          th:text="${enrollment.workoutProgram.difficulty}"></span>
                    <div class="mb-3">
                        <label class="form-label small">
                            Progress: <strong th:text="${enrollment.progressPercentage} + '%'"></strong>
                        </label>
                        <div class="progress">
                            <div class="progress-bar bg-success"
                                 th:style="'width:' + ${enrollment.progressPercentage} + '%'">
                            </div>
                        </div>
                    </div>
                    <form th:action="@{/enrollments/{id}/progress(id=${enrollment.id})}"
                          method="post"
                          class="mt-2">
                        <div class="d-flex gap-2">
                            <input type="number"
                                   name="percentage"
                                   class="form-control form-control-sm"
                                   min="0"
                                   max="100"
                                   th:value="${progressEnrollmentId != null && progressEnrollmentId == enrollment.id && progressDto != null ? progressDto.percentage : enrollment.progressPercentage}">
                            <button type="submit" class="btn btn-primary btn-sm">Update</button>
                        </div>
                        <div class="text-danger small field-error mt-1"
                             th:if="${progressEnrollmentId != null && progressEnrollmentId == enrollment.id && progressError != null}"
                             th:text="${progressError}">
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
