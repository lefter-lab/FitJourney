<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management Panel - FitJourney</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold" href="/">🏋️ FitJourney</a>
    <div>
        <a href="/dashboard" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <h2 class="mb-0">User Management Panel</h2>
            <a href="/dashboard" class="btn btn-secondary btn-sm">Back to Dashboard</a>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Current Role</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.username}"></td>
                        <td th:text="${user.email}"></td>
                        <td>
                            <span class="badge bg-primary" th:text="${user.role}"></span>
                        </td>
                        <td>
                            <form method="post" th:action="@{/admin/users/{id}/role(id=${user.id})}" class="d-flex gap-2 align-items-center">
                                <select name="role" class="form-select form-select-sm w-auto">
                                    <option th:each="r : ${roles}"
                                            th:value="${r}"
                                            th:text="${r}"
                                            th:selected="${r == user.role}"></option>
                                </select>
                                <button type="submit" class="btn btn-primary btn-sm">Change Role</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
