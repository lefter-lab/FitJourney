<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FitJourney</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fj-page">
<nav class="navbar navbar-dark fj-navbar px-4">
    <a class="navbar-brand fw-bold" href="/">🏋️ FitJourney</a>
</nav>

<main class="container fj-main">
    <div class="row justify-content-center">
        <div class="col-md-6 fj-auth-wrapper-wide">
            <div class="card fj-card fj-form-card fj-auth-card fj-card-padded">
                <h3 class="mb-4 text-center">Create Account</h3>
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                <div th:if="${passwordError}" class="alert alert-danger" th:text="${passwordError}"></div>
                <form th:action="@{/register}" th:object="${registerDto}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" th:field="*{username}">
                        <div class="text-danger small field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" th:field="*{email}">
                        <div class="text-danger small field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control" th:field="*{firstName}">
                        <div class="text-danger small field-error" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control" th:field="*{lastName}">
                        <div class="text-danger small field-error" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" th:field="*{password}">
                        <div class="text-danger small field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" th:field="*{confirmPassword}">
                        <div class="text-danger small field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Register</button>
                </form>
                <p class="text-center mt-3 mb-0 fj-auth-footer">
                    Already have an account? <a href="/login">Login here</a>
                </p>
            </div>
        </div>
    </div>
</main>
</body>
</html>
