<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Workout Program - FitJourney</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea { min-height: 120px; }
        button {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .error {
            color: red;
            font-size: 12px;
            margin-top: 3px;
        }
        .cancel-link {
            display: inline-block;
            text-decoration: none;
            color: #6c757d;
        }
        .cancel-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Edit Workout Program</h1>

    <form th:action="@{/programs/{id}/edit(id=${programId})}" th:object="${programDto}" method="post">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" th:field="*{name}" />
            <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" th:field="*{description}"></textarea>
            <div class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
        </div>

        <div class="form-group">
            <label for="durationWeeks">Duration (weeks)</label>
            <input type="number" id="durationWeeks" th:field="*{durationWeeks}" min="1" />
            <div class="error" th:if="${#fields.hasErrors('durationWeeks')}" th:errors="*{durationWeeks}"></div>
        </div>

        <div class="form-group">
            <label for="price">Price</label>
            <input type="number" step="0.01" id="price" th:field="*{price}" min="0" />
            <div class="error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
        </div>

        <div class="form-group">
            <label for="difficultyLevel">Difficulty Level</label>
            <select id="difficultyLevel" th:field="*{difficultyLevel}">
                <option th:each="level : ${levels}" th:value="${level}" th:text="${level}"></option>
            </select>
            <div class="error" th:if="${#fields.hasErrors('difficultyLevel')}" th:errors="*{difficultyLevel}"></div>
        </div>

        <button type="submit">Save Changes</button>
        <a href="/programs/all" class="cancel-link">Cancel</a>
    </form>
</body>
</html>
