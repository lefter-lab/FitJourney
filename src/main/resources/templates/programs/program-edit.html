<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Program - FitJourney</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold" href="/">🏋️ FitJourney</a>
    <a href="/programs/all" class="btn btn-outline-light btn-sm">Back to Programs</a>
</nav>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow p-4">
                <h3 class="mb-4 text-center">Edit Workout Program</h3>
                <form th:action="@{/programs/{id}/edit(id=${programId})}"
                      th:object="${programDto}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Program Name</label>
                        <input type="text" class="form-control" th:field="*{name}">
                        <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
                        <div class="text-danger small" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Duration (weeks)</label>
                        <input type="number" class="form-control" th:field="*{durationWeeks}" min="1">
                        <div class="text-danger small" th:if="${#fields.hasErrors('durationWeeks')}" th:errors="*{durationWeeks}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Price ($)</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{price}" min="0">
                        <div class="text-danger small" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Difficulty Level</label>
                        <select class="form-select" th:field="*{difficultyLevel}">
                            <option th:each="level : ${levels}"
                                    th:value="${level}"
                                    th:text="${level}"></option>
                        </select>
                        <div class="text-danger small" th:if="${#fields.hasErrors('difficultyLevel')}" th:errors="*{difficultyLevel}"></div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning w-100">Save Changes</button>
                        <a href="/programs/all" class="btn btn-outline-secondary w-100">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
