<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programs - FitJourney</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold" href="/">🏋️ FitJourney</a>
    <div class="d-flex gap-2">
        <a href="/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
        <a href="/enrollments/my" class="btn btn-outline-light btn-sm">My Enrollments</a>
        <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-danger btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>All Programs</h2>

        <a sec:authorize="hasRole('TRAINER')"
           href="/programs/create"
           class="btn btn-success">
            + Create Program
        </a>
    </div>

    <div th:if="${#lists.isEmpty(programs)}" class="alert alert-info">
        No programs available yet.
    </div>

    <div class="row g-3" th:unless="${#lists.isEmpty(programs)}">
        <div class="col-md-4" th:each="program : ${programs}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${program.title}"></h5>

                    <span class="badge bg-secondary mb-2"
                          th:text="${program.difficulty}">
                    </span>

                    <p class="card-text small text-muted">
                        Duration:
                        <strong th:text="${program.durationWeeks}"></strong>
                        weeks
                    </p>

                    <p class="card-text">
                        Price:
                        <strong th:text="'$' + ${program.price}"></strong>
                    </p>
                </div>

                <div class="card-footer d-flex gap-2 flex-wrap">
                    <form th:action="@{/enrollments/{id}/enroll(id=${program.id})}"
                          method="post"
                          class="d-inline">
                        <button type="submit" class="btn btn-primary btn-sm">
                            Enroll
                        </button>
                    </form>

                    <div sec:authorize="hasRole('TRAINER')" class="d-flex gap-2 flex-wrap">
                        <a th:href="@{/programs/{id}/edit(id=${program.id})}"
                           class="btn btn-warning btn-sm">
                            Edit
                        </a>

                        <form th:action="@{/programs/{id}/deactivate(id=${program.id})}"
                              method="post"
                              class="d-inline">
                            <button type="submit" class="btn btn-danger btn-sm">
                                Deactivate
                            </button>
                        </form>

                        <form th:action="@{/programs/{id}/delete(id=${program.id})}"
                              method="post"
                              class="d-inline">
                            <button type="submit"
                                    class="btn btn-outline-danger btn-sm"
                                    onclick="return confirm('Are you sure you want to delete this program?');">
                                Delete
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
