<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FitJourney</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold" href="/">🏋️ FitJourney</a>
    <div class="d-flex gap-3">
        <a href="/programs/all" class="btn btn-outline-light btn-sm">Browse Programs</a>
        <a href="/enrollments/my" class="btn btn-outline-light btn-sm">My Enrollments</a>
        <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-danger btn-sm">Logout</button>
        </form>
    </div>
</nav>
<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="mb-3">👋 Welcome to FitJourney!</h2>
        <p class="text-muted">You are successfully logged in.</p>
        <div class="d-flex gap-3 mt-3">
            <a href="/programs/all" class="btn btn-primary">Browse Programs</a>
            <a href="/enrollments/my" class="btn btn-outline-secondary">My Enrollments</a>
        </div>
    </div>
</div>
</body>
</html>
