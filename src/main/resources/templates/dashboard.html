<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FitJourney</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="fj-page">

<nav class="navbar navbar-dark fj-navbar px-4">
    <a class="navbar-brand fw-bold" href="/">🏋️ FitJourney</a>

    <div class="d-flex gap-2">

        <a href="/programs/all"
           class="btn btn-outline-light btn-sm">
            Browse Programs
        </a>

        <a sec:authorize="hasRole('USER')"
           href="/enrollments/my"
           class="btn btn-outline-light btn-sm">
            My Enrollments
        </a>

        <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-danger btn-sm">
                Logout
            </button>
        </form>

    </div>
</nav>

<main class="container fj-main">

    <div class="card fj-card fj-dashboard-welcome fj-card-padded">

        <div class="fj-page-header">
            <h2>👋 Welcome to FitJourney!</h2>
            <p>You are successfully logged in.</p>
        </div>

        <div class="fj-action-grid">

            <a sec:authorize="hasRole('ADMIN')"
               href="/admin/users"
               class="btn btn-primary">
                Admin Panel
            </a>

            <a sec:authorize="hasRole('TRAINER')"
               href="/programs/create"
               class="btn btn-success">
                Create New Program
            </a>

            <a sec:authorize="hasRole('USER')"
               href="/enrollments/my"
               class="btn btn-outline-secondary">
                My Enrollments
            </a>

            <a href="/programs/all"
               class="btn btn-primary">
                Browse All Programs
            </a>

        </div>

    </div>

</main>

</body>
</html>
