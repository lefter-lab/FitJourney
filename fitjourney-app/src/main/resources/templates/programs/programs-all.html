<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programs - FitJourney</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="fj-page">

<nav class="navbar navbar-dark fj-navbar px-4">
    <a class="navbar-brand fw-bold" href="/">🏋️ FitJourney</a>

    <div class="d-flex gap-2">

        <a href="/dashboard"
           class="btn btn-outline-light btn-sm">
            Dashboard
        </a>

        <a sec:authorize="hasRole('USER')"
           href="/enrollments/my"
           class="btn btn-outline-light btn-sm">
            My Enrollments
        </a>

        <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-danger btn-sm">
                Logout
            </button>
        </form>

    </div>
</nav>

<main class="container fj-main">

    <div class="fj-flash-group mb-3">

        <div th:if="${successMessage}"
             class="alert alert-success"
             th:text="${successMessage}">
        </div>

        <div th:if="${enrollmentError}"
             class="alert alert-danger"
             th:text="${enrollmentError}">
        </div>

        <div th:if="${errorMessage}"
             class="alert alert-danger"
             th:text="${errorMessage}">
        </div>

    </div>

    <div class="fj-page-header d-flex justify-content-between align-items-center flex-wrap gap-3">

        <div>
            <h2>All Programs</h2>
            <p>Browse active workout programs and enroll to start your journey.</p>
        </div>

        <a sec:authorize="hasRole('TRAINER')"
           href="/programs/create"
           class="btn btn-success">
            + Create Program
        </a>

    </div>

    <div th:if="${#lists.isEmpty(programs)}"
         class="alert alert-info fj-empty-state">
        No programs available yet.
    </div>

    <div class="row g-4"
         th:unless="${#lists.isEmpty(programs)}">

        <div class="col-md-6 col-lg-4"
             th:each="program : ${programs}">

            <div class="card h-100 fj-program-card">

                <div class="card-body">

                    <h5 class="card-title"
                        th:text="${program.title}">
                    </h5>

                    <span class="badge bg-secondary mb-2"
                          th:text="${program.difficulty}">
                    </span>

                    <p class="fj-program-meta mb-1">
                        Duration:
                        <strong th:text="${program.durationWeeks}"></strong>
                        weeks
                    </p>

                    <p class="fj-program-price mb-0">
                        <span th:text="'$' + ${program.price}"></span>
                    </p>

                </div>

                <div class="card-footer fj-card-footer-muted d-flex gap-2 flex-wrap">

                    <form sec:authorize="hasRole('USER')"
                          th:action="@{/enrollments/{id}/enroll(id=${program.id})}"
                          method="post"
                          class="d-inline">

                        <button type="submit"
                                class="btn btn-primary btn-sm">
                            Enroll
                        </button>

                    </form>

                    <a th:href="@{/programs/{id}(id=${program.id})}"
                       class="btn btn-outline-secondary btn-sm">
                        Details
                    </a>

                    <a th:href="@{/reviews/programs/{id}(id=${program.id})}"
                       class="btn btn-outline-primary btn-sm">
                        Reviews
                    </a>

                    <div sec:authorize="hasRole('TRAINER')"
                         th:if="${currentUserId != null && program.trainer.id == currentUserId}"
                         class="d-flex gap-2 flex-wrap">

                        <a th:href="@{/programs/{id}/edit(id=${program.id})}"
                           class="btn btn-warning btn-sm">
                            Edit
                        </a>

                        <form th:action="@{/programs/{id}/deactivate(id=${program.id})}"
                              method="post"
                              class="d-inline">

                            <button type="submit"
                                    class="btn btn-danger btn-sm">
                                Deactivate
                            </button>

                        </form>

                        <form th:action="@{/programs/{id}/delete(id=${program.id})}"
                              method="post"
                              class="d-inline">

                            <button type="submit"
                                    class="btn btn-outline-danger btn-sm"
                                    onclick="return confirm('Are you sure you want to delete this program?');">
                                Delete
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</main>

</body>
</html>
