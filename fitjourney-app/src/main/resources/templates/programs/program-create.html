<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Program - FitJourney</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fj-page">
<nav class="navbar navbar-dark fj-navbar px-4">
    <a class="navbar-brand fw-bold" href="/">🏋️ FitJourney</a>
    <a href="/programs/all" class="btn btn-outline-light btn-sm">Back to Programs</a>
</nav>

<main class="container fj-main">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card fj-card fj-form-card fj-card-padded">
                <h3 class="mb-4 text-center">Create Workout Program</h3>
                <form th:action="@{/programs/create}" th:object="${programDto}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Program Name</label>
                        <input type="text" class="form-control" th:field="*{name}">
                        <div class="text-danger small field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
                        <div class="text-danger small field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Duration (weeks)</label>
                        <input type="number" class="form-control" th:field="*{durationWeeks}" min="1">
                        <div class="text-danger small field-error" th:if="${#fields.hasErrors('durationWeeks')}" th:errors="*{durationWeeks}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Price ($)</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{price}" min="0">
                        <div class="text-danger small field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Difficulty Level</label>
                        <select class="form-select" th:field="*{difficultyLevel}">
                            <option th:each="level : ${levels}"
                                    th:value="${level}"
                                    th:text="${level}"></option>
                        </select>
                        <div class="text-danger small field-error" th:if="${#fields.hasErrors('difficultyLevel')}" th:errors="*{difficultyLevel}"></div>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Create Program</button>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
