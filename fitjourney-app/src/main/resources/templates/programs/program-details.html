<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program Details - FitJourney</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="fj-page">

<nav class="navbar navbar-dark fj-navbar px-4">
    <a class="navbar-brand fw-bold" href="/">FitJourney</a>

    <div class="d-flex gap-2">

        <a href="/dashboard" class="btn btn-outline-light btn-sm">
            Dashboard
        </a>

        <a href="/programs/all" class="btn btn-outline-light btn-sm">
            Back to Programs
        </a>

        <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-danger btn-sm">
                Logout
            </button>
        </form>

    </div>
</nav>

<main class="container fj-main">

    <div class="card fj-program-card shadow-sm">

        <div class="card-body">
            <h2 class="card-title mb-3" th:text="${program.title}">Program title</h2>

            <span class="badge bg-secondary mb-3" th:text="${program.difficulty}">Difficulty</span>

            <p class="mb-3" th:text="${program.description}">Program description</p>

            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="p-3 border rounded">
                        <small class="text-muted d-block">Duration</small>
                        <strong th:text="${program.durationWeeks}">8</strong> weeks
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="p-3 border rounded">
                        <small class="text-muted d-block">Price</small>
                        <strong th:text="'$' + ${program.price}">$0</strong>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="p-3 border rounded">
                        <small class="text-muted d-block">Trainer</small>
                        <strong th:text="${program.trainer.username}">Trainer</strong>
                    </div>
                </div>
            </div>

            <hr class="my-4">

            <h4 class="mb-3">Nutrition Plan</h4>

            <div th:if="${nutritionPlan != null}" class="p-3 border rounded bg-light">
                <h5 class="mb-2" th:text="${nutritionPlan.name}">Plan name</h5>
                <p class="mb-2" th:text="${nutritionPlan.description}">Plan description</p>
                <p class="mb-0">
                    Daily calories:
                    <strong th:text="${nutritionPlan.dailyCalories}">0</strong>
                </p>
            </div>

            <div th:if="${nutritionPlan == null}" class="alert alert-info mb-0">
                No nutrition plan is currently available for this workout program.
            </div>

        </div>

    </div>

</main>

</body>
</html>
