<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <title>FitJourney</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<body class="fj-page fj-page-landing">
