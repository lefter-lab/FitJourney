<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - FitJourney</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="fj-page">

<nav class="navbar navbar-dark fj-navbar px-4">
    <a class="navbar-brand fw-bold" href="/">FitJourney</a>

    <div class="d-flex gap-2">

        <a href="/dashboard" class="btn btn-outline-light btn-sm">
            Dashboard
        </a>

        <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-danger btn-sm">
                Logout
            </button>
        </form>

    </div>
</nav>

<main class="container fj-main">

    <div class="fj-flash-group mb-3">
        <div th:if="${successMessage}"
             class="alert alert-success"
             th:text="${successMessage}"></div>
    </div>

    <div class="card fj-card fj-card-padded">
        <div class="fj-page-header mb-4">
            <h2>My Profile</h2>
            <p>Review and update your personal details.</p>
        </div>

        <form th:action="@{/profile}"
              method="post"
              th:object="${profileDto}"
              class="row g-3">

            <div class="col-12">
                <label for="username" class="form-label">Username</label>
                <input type="text"
                       id="username"
                       th:field="*{username}"
                       class="form-control"
                       readonly>
                <div class="text-danger small mt-1" th:errors="*{username}"></div>
            </div>

            <div class="col-12">
                <label for="email" class="form-label">Email</label>
                <input type="email"
                       id="email"
                       th:field="*{email}"
                       class="form-control">
                <div class="text-danger small mt-1" th:errors="*{email}"></div>
            </div>

            <div class="col-md-6">
                <label for="firstName" class="form-label">First Name</label>
                <input type="text"
                       id="firstName"
                       th:field="*{firstName}"
                       class="form-control">
                <div class="text-danger small mt-1" th:errors="*{firstName}"></div>
            </div>

            <div class="col-md-6">
                <label for="lastName" class="form-label">Last Name</label>
                <input type="text"
                       id="lastName"
                       th:field="*{lastName}"
                       class="form-control">
                <div class="text-danger small mt-1" th:errors="*{lastName}"></div>
            </div>

            <div class="col-12 d-flex gap-2 flex-wrap mt-2">
                <button type="submit" class="btn btn-primary">
                    Save Changes
                </button>

                <a href="/dashboard" class="btn btn-outline-secondary">
                    Back to Dashboard
                </a>
            </div>

        </form>
    </div>

</main>

</body>
</html>
